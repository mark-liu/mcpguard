version: 2

project_name: mcpguard

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: mcpguard
    main: ./cmd/mcpguard
    binary: mcpguard
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^Merge"

# brews: disabled until HOMEBREW_TAP_TOKEN is scoped for this repo
# Re-enable once a fine-grained PAT with homebrew-tap Contents:Write is created
